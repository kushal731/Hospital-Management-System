<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0%;
        padding: 0%;
        border: 0;
      }
      #main {
        width: 100vw;
        height: 100vh;
        position: relative;
        background: linear-gradient(to right, #a18cd1, #fbc2eb);
      }
      #sub1 {
        width: 50vw;
        height: 100vh;
        position: absolute;
      }
      #sub2 {
        margin-left: 50vw;
        width: 50vw;
        height: 100vh;
        position: absolute;
        background-color: #f5f5f5;
      }
      #sub11 {
        margin-top: 20vh;
        margin-left: 10vw;
        margin-bottom: 10vh;
        width: 40vw;
        height: 70vh;
        position: absolute;
        background-color: #f5f5f5;
        box-shadow: 2px 2px 5px black;
      }
      #sub21 {
        margin-top: 20vh;
        margin-right: 10vw;
        margin-bottom: 10vh;
        width: 40vw;
        height: 70vh;
        position: absolute;
        background-color: #87ceeb;
        box-shadow: 2px 2px 5px black;
      }
      #sub12 {
        top: 1vh;
        left: 10vw;
        width: 20vw;
        height: 60vh;
        padding: 20px;
        background-color: #ffffff;
        position: absolute;
      }
      #sub12_para1 {
        font-size: 25px;

        text-align: center;
        color: #0c7e70; /* Deep teal tone */
        font-weight: 900; /* Normal weight */
      }
      #sub12_para2 {
        text-align: center;
        margin-top: -18px;
        margin-bottom: 18px;
      }

      form {
        margin-top: -20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0px; /* spacing between inputs */
      }

      form input[type="email"],
      form input[type="password"] {
        width: 200px;
        height: 20px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      /* Focus effect */
      form input[type="email"]:focus,
      form input[type="password"]:focus {
        border-color: #6a0dad; /* purple highlight */
        outline: none;
        width: 220px; /* expands slightly */
        height: 30px;
        background-color: antiquewhite;
      }

      /* Submit button */
      form .login1[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #6a0dad; /* purple */
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s ease;
        margin-top: 10px;
      }

      form .login1[type="submit"]:hover {
        background: #4b0082; /* darker purple */
      }

      /* Submit button */
      .create1 {
        width: 100%;
        padding: 12px;
        background: #6a0dad; /* purple */
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s ease;
        margin-top: 10px;
      }

      .create1:hover {
        background: #4b0082; /* darker purple */
      }
      #sub0-1 {
        left: 20vw;
        position: absolute;
        width: 30vw;
        height: 20vh;
      }
      #sub0-1 h1 {
        left: 13vw;
        position: absolute;
        font-size: 100px;
        color: #ffffff;
        margin-top: -25px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #sub0-2 h1 {
        right: 27.9vw;
        position: absolute;
        font-size: 100px;
        color: #a18cd1;
        margin-top: -25px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #sub0-2 h2 {
        position: absolute;
        top: 14vh;
        left: 15vw;
        color: gray;
        font-size: 25px;
        font-family: "Segoe UI", sans-serif;
        font-weight: bold;
      }
      #sub21 img {
        position: absolute;
        top: 20vh;
        left: 7.5vw;
        width: 25vw;
        height: 35vh;
      }
    </style>
  </head>
  <body>
    <header></header>
    <main>
      <div id="main">
        <div id="sub1">
          <div id="sub0-1">
            <h1>HOS</h1>
          </div>
          <div id="sub11">
            <div id="sub12">
              <p id="sub12_para1">Hospital</p>
              <br />
              <p id="sub12_para2">Managment service</p>
              <br />
              <form action="/login1" method="post">
                <input
                  type="email"
                  placeholder="email or phone"
                  name="Email"
                /><br />
                <input type="password" name="npass_word" /><br />
                <button class="login1" type="submit">login</button>
              </form>
              {% if message %}
              <p style="color: red">{{ message }}</p>
              {% endif %}
              <p>create a new account</p>
              <a href="/Create_account"
                ><button class="create1">create</button></a
              >
            </div>
          </div>
        </div>

        <div id="sub2">
          <div id="sub0-2">
            <h1>PITAL</h1>
            <h2>Login</h2>
          </div>
          <div id="sub21">
            <img
              src="{{ url_for('static', filename='hospital_login_logo.png') }}"
              alt=""
              width="200px"
              height="200px"
            />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>

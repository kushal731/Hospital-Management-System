<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e3f2fd, #bbdefb);
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1565c0;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        button:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Book an Appointment</h2>
        <form action="/appointment_submit" method="POST">
            <label for="name">Patient Name</label>
            <input type="text" id="name" name="Aname" required>

            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="Aphone" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="Aemail" required>

            <label for="dept">Department</label>
            <select id="dept" name="dept" required>
                <option value="">-- Select Department --</option>
                <option value="Cardiology">Cardiology</option>
                <option value="Orthopedics">Orthopedics</option>
                <option value="Neurology">Neurology</option>
                <option value="General Medicine">General Medicine</option>
            </select>

            <label for="date">Appointment Date</label>
            <input type="date" id="date" name="date" required>

            <button type="submit">Submit Appointment</button>
        </form>
    </div>
</body>
</html>
